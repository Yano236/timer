<head>

    <style>
        /* 原CSS文件内容开始 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: 'Poppins', sans-serif;
        }

        /* 全屏 Loading 遮罩 */
        #loading-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background:
                radial-gradient(circle at 50% 42%, rgba(255, 255, 255, 0.96) 0 18%, rgba(255, 247, 250, 0.82) 42%, transparent 63%),
                linear-gradient(135deg, #fff8f5 0%, #f8fbff 45%, #fff0f7 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            font-size: 2rem;
            font-weight: bold;
            color: #5e1230;
            z-index: 9999;
            overflow: hidden;
            transition: opacity 0.9s ease-out, visibility 0.9s ease-out, transform 0.9s ease-out;
        }

        #loading-screen::before,
        #loading-screen::after {
            content: "";
            position: absolute;
            inset: -18%;
            pointer-events: none;
            z-index: 0;
        }

        #loading-screen::before {
            background:
                linear-gradient(115deg, transparent 0 22%, rgba(255, 255, 255, 0.58) 34%, transparent 47%),
                repeating-linear-gradient(90deg, rgba(255, 83, 143, 0.06) 0 1px, transparent 1px 92px);
            animation: openingSheen 6s ease-in-out infinite;
        }

        #loading-screen::after {
            background:
                radial-gradient(circle at center, transparent 0 43%, rgba(255, 120, 174, 0.16) 62%, rgba(112, 189, 180, 0.08) 74%, transparent 76%);
            animation: openingHalo 4.8s ease-in-out infinite;
        }

        /* 隐藏 loading 画面 */
        #loading-screen.hidden {
            opacity: 0;
            visibility: hidden;
            transform: scale(1.02);
        }

        /* 包裹容器 */
        .loading-content {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            isolation: isolate;
            z-index: 1;
        }

        /* 调整canvas大小 - 占1/4屏幕 */
        #heartCanvas {
            width: clamp(310px, 64vmin, 640px);
            height: clamp(310px, 64vmin, 640px);
            display: block;
            margin-bottom: 12px;
            filter: drop-shadow(0 24px 42px rgba(255, 74, 139, 0.2));
            animation: loadingFloat 3.8s ease-in-out infinite;
            will-change: transform;
        }

        /* 加载文字容器 */
        .loading-text {
            position: absolute;
            top: 51%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: min(82vw, 500px);
            padding: 28px 34px 24px;
            border: 1px solid rgba(255, 255, 255, 0.68);
            border-radius: 28px;
            background: rgba(255, 255, 255, 0.42);
            box-shadow: 0 24px 70px rgba(255, 66, 136, 0.14), inset 0 1px 0 rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
        }

        /* 主标题文字 - 使用更浪漫的手写字体 */
        .main-text {
            font-family: 'Dancing Script', 'Pacifico', cursive;
            font-size: clamp(1.9rem, 3.4vw, 2.75rem);
            color: #6d0039;
            font-weight: 700;
            margin-bottom: 14px;
            text-shadow: 0 8px 24px rgba(255, 255, 255, 0.9);
            letter-spacing: 0;
            white-space: nowrap;
            animation: textGlow 2.4s ease-in-out infinite;
        }

        /* 进度文字 */
        .progress-text {
            font-family: 'Poppins', sans-serif;
            position: relative;
            display: inline-flex;
            min-width: 148px;
            justify-content: center;
            padding: 9px 18px;
            border-radius: 999px;
            background: rgba(255, 255, 255, 0.74);
            color: #8b2451;
            font-size: clamp(0.86rem, 2vw, 1.02rem);
            font-weight: 600;
            line-height: 1.2;
            box-shadow: 0 10px 26px rgba(255, 80, 145, 0.13);
            text-shadow: 0 1px 2px rgba(255, 255, 255, 0.9);
        }

        /* 爱心爆炸动画粒子 */
        .heart-explosion {
            position: absolute;
            width: 14px;
            height: 14px;
            background: #ff3b8d;
            border-radius: 4px 4px 0 0;
            pointer-events: none;
            opacity: 0;
            transform: rotate(-45deg);
            filter: drop-shadow(0 8px 12px rgba(255, 59, 141, 0.25));
        }

        .heart-explosion::before,
        .heart-explosion::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
        }

        .heart-explosion::before {
            left: 0;
            top: -50%;
        }

        .heart-explosion::after {
            left: 50%;
            top: 0;
        }

        @keyframes explode {
            0% {
                transform: translate(0, 0) rotate(-45deg) scale(0);
                opacity: 1;
            }
            45% {
                opacity: 0.92;
            }
            100% {
                transform: translate(var(--tx), var(--ty)) rotate(var(--rotate)) scale(var(--scale));
                opacity: 0;
            }
        }

        @keyframes openingSheen {
            0%, 100% {
                transform: translateX(-5%) rotate(0.001deg);
                opacity: 0.55;
            }
            50% {
                transform: translateX(5%) rotate(0.001deg);
                opacity: 0.9;
            }
        }

        @keyframes openingHalo {
            0%, 100% {
                transform: scale(0.98);
                opacity: 0.64;
            }
            50% {
                transform: scale(1.06);
                opacity: 1;
            }
        }

        @keyframes loadingFloat {
            0%, 100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes textGlow {
            0%, 100% {
                filter: drop-shadow(0 0 0 rgba(255, 88, 148, 0));
            }
            50% {
                filter: drop-shadow(0 10px 18px rgba(255, 88, 148, 0.18));
            }
        }

        /* Loading 文字 */
        .loading-text {
            text-align: center;
        }

        /* 添加白色蒙版 */
        section::before {
            content: "";
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.2);

        /* 居中文字 */
        .overlay-div {

            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .overlay-text {
            font-weight: bold;
            font-size: 5vw;
        }

        .small-font {
            font-size: 2vw;
        }

        section {
            position: fixed;

        .images-gallery {

        }

        .column {

        }

        .column img {

        }

        .column:nth-child(odd) {

        @media screen and (max-width: 768px) {
            .overlay-text {

            }

            }

        /* 原CSS文件内容结束 */

    <script>
        var startTime = new Date("2026-04-29T09:59:00").getTime() / 1000 - 86400; // 目标时间
        let body = document.body;
        var flipdown = new FlipTimer(startTime).start()
        body.querySelector('#fliptimer').classList.toggle('fliptimer__theme-light');

        document.addEventListener("DOMContentLoaded", function () {
            const gallery = document.getElementById("images-gallery");
            const columns = document.querySelectorAll(".column");
            const loadingScreen = document.getElementById("loading-screen");
            const shouldSkipIntro = new URLSearchParams(window.location.search).get("skipIntro") === "1";

            const isMobileViewport = window.matchMedia("(max-width: 768px)").matches;
            const scrollSpeed = isMobileViewport ? 18 : 42; // px/s
            let scrollPosition = 0; // 记录当前滚动位置
            let lastScrollTime = null;
            let isLoaded = false; // **是否加载完成**

            // 获取 Canvas
            const canvas = document.getElementById("heartCanvas");
            const ctx = canvas.getContext("2d");
            const canvasSize = isMobileViewport ? 500 : 600;
            const dpr = isMobileViewport ? 1 : Math.min(window.devicePixelRatio || 1, 1.25);
            canvas.width = canvasSize * dpr;
            canvas.height = canvasSize * dpr;
            ctx.setTransform(dpr, 0, 0, dpr, 0, 0);

            const centerX = canvasSize / 2;
            const centerY = canvasSize / 2 + 12;

            const particles = [];
            const particleCount = isMobileViewport ? 150 : 210;
            const outlineCount = Math.round(particleCount * 0.54);
            const heartScale = isMobileViewport ? 11.2 : 13.7;
            let progressPercent = 0; // 进度条（0~100）
            let progressValue = 0;
            let displayedProgress = -1;
            let isIntroAnimating = !shouldSkipIntro;

            function heartFunction(t, scale = heartScale) {
                return {
                    x: centerX + 16 * scale * Math.pow(Math.sin(t), 3),
                    y: centerY - scale * (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
                };
            }

            function drawHeartPath(progress, alpha, lineWidth, glow) {
                if (progress <= 0) return;

                const gradient = ctx.createLinearGradient(centerX - 220, centerY - 210, centerX + 220, centerY + 210);
                gradient.addColorStop(0, "#ff5d9e");
                gradient.addColorStop(0.48, "#ff9ac7");
                gradient.addColorStop(1, "#83d8cf");

                ctx.save();
                ctx.globalAlpha = alpha;
                ctx.strokeStyle = gradient;
                ctx.lineWidth = lineWidth;
                ctx.lineCap = "round";
                ctx.lineJoin = "round";
                ctx.shadowColor = "rgba(255, 80, 148, 0.48)";
                ctx.shadowBlur = isMobileViewport ? glow * 0.35 : glow;
                ctx.beginPath();

                const maxT = Math.PI * 2 * progress;
                for (let t = 0; t <= maxT; t += 0.025) {
                    const pos = heartFunction(t);
                    if (t === 0) {
                        ctx.moveTo(pos.x, pos.y);
                    } else {
                        ctx.lineTo(pos.x, pos.y);
                    }
                }

                ctx.stroke();
                ctx.restore();
            }

            function createParticles() {
                for (let i = 0; i < particleCount; i++) {
                    const outline = i < outlineCount;
                    const t = outline ? (Math.PI * 2 * i) / outlineCount : Math.random() * Math.PI * 2;
                    const edge = heartFunction(t);
                    const depth = outline ? 0.94 + Math.random() * 0.08 : 0.18 + Math.pow(Math.random(), 0.45) * 0.72;
                    const jitter = outline ? 1.4 : 4.2;
                    const x = centerX + (edge.x - centerX) * depth + (Math.random() - 0.5) * jitter;
                    const y = centerY + (edge.y - centerY) * depth + (Math.random() - 0.5) * jitter;

                    particles.push({
                        x,
                        y,
                        originalX: x,
                        originalY: y,
                        size: outline ? Math.random() * 2.6 + 2.3 : Math.random() * 2.8 + 1.2,
                        alpha: 0,
                        revealAt: Math.random() * (outline ? 0.72 : 0.78),
                        revealSpeed: outline ? 0.16 + Math.random() * 0.08 : 0.2 + Math.random() * 0.12,
                        hue: outline ? Math.random() * 20 + 335 : Math.random() * 70 + 315,
                        lightness: outline ? Math.random() * 10 + 58 : Math.random() * 14 + 64,
                        depth,
                        outline,
                        phase: Math.random() * Math.PI * 2
                    });
                }
            }

            function drawParticles() {
                const now = performance.now() * 0.001;
                const progress = progressValue;

                ctx.clearRect(0, 0, canvasSize, canvasSize);

                const glow = ctx.createRadialGradient(centerX, centerY, 16, centerX, centerY, isMobileViewport ? 202 : 244);
                glow.addColorStop(0, `rgba(255, 255, 255, ${0.35 + progress * 0.18})`);
                glow.addColorStop(0.36, `rgba(255, 110, 168, ${0.12 + progress * 0.13})`);
                glow.addColorStop(0.72, `rgba(131, 216, 207, ${0.04 + progress * 0.08})`);
                glow.addColorStop(1, "rgba(255, 255, 255, 0)");
                ctx.fillStyle = glow;
                ctx.beginPath();
                ctx.arc(centerX, centerY, isMobileViewport ? 214 : 254, 0, Math.PI * 2);
                ctx.fill();

                drawHeartPath(1, 0.12 + progress * 0.34, isMobileViewport ? 1.6 : 2, 8 + progress * 8);

                ctx.save();
                ctx.globalCompositeOperation = "lighter";
                particles.forEach((p, index) => {
                    const localProgress = Math.max(0, Math.min(1, (progress - p.revealAt) / p.revealSpeed));
                    const targetAlpha = localProgress * localProgress * (3 - 2 * localProgress);
                    p.alpha += (targetAlpha - p.alpha) * 0.14;
                    if (p.alpha < 0.01) return;

                    const drift = p.outline ? 1.2 : 2.6;
                    const shimmer = 0.86 + Math.sin(now * 2.1 + p.phase) * 0.14;
                    const x = p.originalX + Math.sin(now * 1.35 + p.phase) * drift * (1.08 - p.depth);
                    const y = p.originalY + Math.cos(now * 1.15 + p.phase) * drift * (1.08 - p.depth);
                    const radius = p.size * shimmer * (0.92 + progress * 0.22);

                    ctx.globalAlpha = p.alpha * (p.outline ? 0.88 : 0.68);
                    ctx.fillStyle = `hsl(${p.hue}, 94%, ${p.lightness}%)`;
                    ctx.beginPath();
                    ctx.arc(x, y, radius, 0, Math.PI * 2);
                    ctx.fill();
                });
                ctx.restore();

                ctx.save();
                ctx.globalAlpha = 0.38 + progress * 0.34;
                ctx.fillStyle = "rgba(255, 255, 255, 0.72)";
                ctx.shadowColor = "rgba(255, 86, 149, 0.28)";
                ctx.shadowBlur = isMobileViewport ? 6 : 14;
                ctx.beginPath();
                ctx.arc(centerX, centerY + 3 + Math.sin(now * 2.1) * 1.6, 7 + progress * 2.8, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }

            function renderIntro() {
                if (!isIntroAnimating) return;
                const elapsed = performance.now() - loadingStartTime;
                const rawProgress = Math.min(1, elapsed / loadingDuration);
                const easedProgress = 1 - Math.pow(1 - rawProgress, 3);
                progressValue = easedProgress;
                progressPercent = Math.min(100, Math.floor(progressValue * 100));
                updateLoadingText(progressPercent);
                drawParticles();

                if (rawProgress < 1) {
                    requestAnimationFrame(renderIntro);
                    return;
                }

                progressPercent = 100;
                progressValue = 1;
                updateLoadingText(100);
                setTimeout(() => {
                    playHeartExplosion();
                    setTimeout(() => {
                        isIntroAnimating = false;
                        loadingScreen.classList.add("hidden");
                        isLoaded = true;
                        requestAnimationFrame(autoScroll);
                    }, 760);
                }, 220);
            }

            const photoUrls = [
                "./images/photo1.jpg",
                "./images/photo2.jpg",
                "./images/photo3.jpg",
                "./images/photo4.jpg",
                "./images/photo5.jpg",
                "./images/photo6.jpg",
                "./images/photo7.jpg",
                "./images/photo8.jpg",
                "./images/photo9.jpg",
                "./images/photo10.jpg",
                "./images/photo11.jpg",
                "./images/photo12.jpg",
                "./images/photo13.jpg",
            ];

            // **工具函数：随机获取图片，尽量避开同一行和相邻位置的重复**
            function getRandomImage(exclude = []) {
                const blocked = new Set(exclude.filter(Boolean));
                const candidates = photoUrls.filter((url) => !blocked.has(url));
                const pool = candidates.length ? candidates : photoUrls;
                const randomIndex = Math.floor(Math.random() * pool.length);
                return pool[randomIndex];
            }

            function getColumnImages(column) {
                return Array.from(column.querySelectorAll("img")).map((img) => img.dataset.photoSrc || img.src.split("?")[0]);
            }

            function setGalleryImage(img, photoUrl) {
                img.dataset.photoSrc = photoUrl;
                img.src = photoUrl + '?x-oss-process=image/resize,p_20';
                img.alt = "img";
            }

            // **更新加载文本**
            function updateLoadingText(percent) {
                if (displayedProgress === percent) return;
                displayedProgress = percent;
                const progressText = document.getElementById("progress-text");
                if (progressText) {
                    progressText.textContent = percent >= 100 ? "准备好啦 100%" : `加载中... ${percent}%`;
                }
            }

            // 固定时间加载逻辑
            let loadingStartTime = performance.now();
            const loadingDuration = 2400;

            // 爱心爆炸动画函数
            function playHeartExplosion() {
                const particleCount = isMobileViewport ? 42 : 62;
                const container = document.getElementById("loading-screen");
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                
                for (let i = 0; i < particleCount; i++) {
                    const particle = document.createElement("div");
                    particle.className = "heart-explosion";
                    
                    // 随机方向和距离
                    const angle = Math.random() * Math.PI * 2;
                    const distance = 78 + Math.random() * Math.min(window.innerWidth, window.innerHeight) * 0.22;
                    const tx = Math.cos(angle) * distance;
                    const ty = Math.sin(angle) * distance - Math.random() * 46;
                    const size = isMobileViewport ? 7 + Math.random() * 9 : 8 + Math.random() * 12;
                    
                    particle.style.setProperty('--tx', `${tx}px`);
                    particle.style.setProperty('--ty', `${ty}px`);
                    particle.style.setProperty('--rotate', `${-45 + Math.random() * 160}deg`);
                    particle.style.setProperty('--scale', `${0.42 + Math.random() * 0.95}`);
                    particle.style.left = `${centerX}px`;
                    particle.style.top = `${centerY}px`;
                    particle.style.backgroundColor = `hsl(${330 + Math.random() * 36}, 96%, ${58 + Math.random() * 13}%)`;
                    particle.style.animation = `explode ${0.68 + Math.random() * 0.32}s cubic-bezier(.12,.72,.26,1) ${Math.random() * 0.08}s forwards`;
                    particle.style.width = `${size}px`;
                    particle.style.height = `${size}px`;
                    
                    container.appendChild(particle);
                    
                    // 动画结束后移除元素
                    setTimeout(() => {
                        particle.remove();
                    }, 1100);
                }
            }

            // **1. 初始化，每个 column 先填充 8 张图片**
            function initializeGallery() {
                for (let row = 0; row < 8; row++) {
                    const usedInRow = [];
                    columns.forEach((column) => {
                        const newDiv = document.createElement("div");
                        const newImg = document.createElement("img");
                        const columnImages = getColumnImages(column);
                        const previousInColumn = columnImages[columnImages.length - 1];
                        const photoUrl = getRandomImage([...usedInRow, previousInColumn]);
                        usedInRow.push(photoUrl);
                        setGalleryImage(newImg, photoUrl);
                        newDiv.appendChild(newImg);
                        column.appendChild(newDiv);
                    });
                }
                
                if (shouldSkipIntro) {
                    isIntroAnimating = false;
                    loadingScreen.classList.add("hidden");
                    isLoaded = true;
                    requestAnimationFrame(autoScroll);
                } else {
                    loadingStartTime = performance.now();
                }
            }

            // **2. 检查每个 column 是否触底**
            function checkColumns() {
                columns.forEach((column) => {
                    const rect = column.getBoundingClientRect();
                    const windowHeight = window.innerHeight;

                    if (rect.bottom < windowHeight + windowHeight / 2) {
                        addNewImageToColumn(column);
                    }
                });
            }

            // **3. 只给触底的 column 添加图片**
            function addNewImageToColumn(column) {
                const newDiv = document.createElement("div");
                const newImg = document.createElement("img");
                const rowIndex = column.children.length;
                const sameRowImages = Array.from(columns)
                    .filter((otherColumn) => otherColumn !== column)
                    .map((otherColumn) => otherColumn.children[rowIndex]?.querySelector("img")?.dataset.photoSrc);
                const columnImages = getColumnImages(column);
                const previousInColumn = columnImages[columnImages.length - 1];
                const photoUrl = getRandomImage([...sameRowImages, previousInColumn]);
                setGalleryImage(newImg, photoUrl);
                newDiv.appendChild(newImg);
                column.appendChild(newDiv);
            }

            // **4. 自动滚动**
            function autoScroll() {
                if (!isLoaded) return; // **未加载完成前不滚动**

                checkColumns(); // 每帧检查是否有列触底

                const now = performance.now();
                if (lastScrollTime === null) {
                    lastScrollTime = now;
                }
                const deltaSeconds = Math.min((now - lastScrollTime) / 1000, 0.05);
                lastScrollTime = now;

                scrollPosition += scrollSpeed * deltaSeconds;
                gallery.scrollTop = scrollPosition;

                requestAnimationFrame(autoScroll);
            }

            createParticles(); // 创建粒子
            initializeGallery(); // 开始加载图片
            drawParticles(); // 先绘制空白爱心
            requestAnimationFrame(renderIntro);
        });
    </script>
</body>

</html>
