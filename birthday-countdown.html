<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
  <title>iOS 风格倒计时</title>
  <meta name="theme-color" content="#0e0f14" />
  <style>
    /* ---------- 基础变量与字体 ---------- */
    :root{
      --bg-1:#0e0f14;
      --bg-2:#141828;
      --fg:#e9ecf1;
      --muted:#aeb6c9;
      --accent:#7aa8ff;
      --accent-2:#ff7ad1;
      --glass-bg: rgba(255,255,255,.10);
      --glass-stroke: rgba(255,255,255,.35);
      --glass-stroke-soft: rgba(255,255,255,.18);
      --shadow: 0 10px 30px rgba(0,0,0,.35);
      --radius: 26px;
      --radius-pill: 20px;
    }
    html,body{
      height:100%;
      margin:0;
      color:var(--fg);
      background: radial-gradient(1200px 1200px at 10% -10%, #1b2340 0%, transparent 60%),
                  radial-gradient(900px 900px at 110% 10%, #361a45 0%, transparent 55%),
                  radial-gradient(900px 900px at -10% 120%, #1c3a45 0%, transparent 55%),
                  linear-gradient(180deg, var(--bg-1), var(--bg-2));
      font: 16px/1.5 -apple-system,BlinkMacSystemFont,"SF Pro Text","SF Pro Display","Segoe UI",Roboto,Helvetica,Arial,"PingFang SC","Hiragino Sans GB","Noto Sans CJK SC","Microsoft Yahei","Helvetica Neue",sans-serif;
      -webkit-font-smoothing:antialiased;
      -moz-osx-font-smoothing:grayscale;
    }

    /* ---------- iOS 壁纸感的动态彩斑 ---------- */
    .blobs{
      position:fixed; inset:0; pointer-events:none; overflow:hidden; z-index:0;
      filter: blur(60px) saturate(130%);
    }
    .blob{
      position:absolute; width:40vmax; height:40vmax; border-radius:50%;
      opacity:.35; mix-blend-mode:screen; transform:translate(-50%,-50%);
      animation: float 18s ease-in-out infinite;
      will-change: transform;
    }
    .blob:nth-child(1){ left:15%; top:10%; background: radial-gradient(circle at 30% 30%, #6fa2ff, transparent 60%); }
    .blob:nth-child(2){ left:85%; top:12%; background: radial-gradient(circle at 60% 40%, #ff7ad1, transparent 60%); animation-delay:-6s;}
    .blob:nth-child(3){ left:10%; top:85%; background: radial-gradient(circle at 40% 60%, #6fffd6, transparent 60%); animation-delay:-12s;}
    @keyframes float{
      0%,100%{ transform:translate(-50%,-50%) translate3d(0,0,0) }
      50%{ transform:translate(-50%,-50%) translate3d(6%, -4%, 0) }
    }

    /* ---------- 布局 ---------- */
    .screen{
      position:relative;
      min-height:100%;
      display:grid;
      place-items:center;
      padding: max(24px, env(safe-area-inset-top)) 20px max(28px, env(safe-area-inset-bottom));
      z-index:1;
    }
    .stack{
      width:min(960px, 92vw);
      display:grid;
      gap:22px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 840px){
      .stack{ grid-template-columns: 1fr 380px; align-items: start; }
    }

    /* ---------- 玻璃组件（倒计时卡片） ---------- */
    .widget{
      position:relative;
      border-radius: var(--radius);
      background: var(--glass-bg);
      border: 1px solid var(--glass-stroke-soft);
      backdrop-filter: blur(22px) saturate(140%);
      -webkit-backdrop-filter: blur(22px) saturate(140%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.25);
      overflow:hidden;
    }
    .widget::before{
      /* 顶部高光 */
      content:""; position:absolute; inset:0 0 auto 0; height:55%;
      background: linear-gradient(180deg, rgba(255,255,255,.22), rgba(255,255,255,0));
      pointer-events:none;
    }
    .widget::after{
      /* 绕边微光描边 */
      content:""; position:absolute; inset:0; border-radius:inherit; pointer-events:none;
      box-shadow: inset 0 0 0 1px var(--glass-stroke), inset 0 0 60px rgba(255,255,255,.06);
      mix-blend-mode:screen;
    }

    .widget-header{
      display:flex; align-items:center; justify-content:space-between;
      padding:18px 20px 6px 20px;
    }
    .title{
      display:flex; align-items:center; gap:10px; font-weight:700; letter-spacing:.2px;
    }
    .emoji{ font-size:22px; filter: drop-shadow(0 2px 6px rgba(0,0,0,.35)); }
    .until{
      font-size:13px; color:var(--muted);
    }

    .timer{
      display:grid; grid-template-columns: repeat(4, 1fr); gap:14px;
      padding: 4px 18px 20px 18px;
    }
    .unit{
      position:relative; text-align:center;
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      border:1px solid rgba(255,255,255,.28);
      border-top-color: rgba(255,255,255,.45);
      border-radius: var(--radius); padding:16px 10px 14px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 6px 20px rgba(0,0,0,.25);
    }
    .value{
      font-variant-numeric: tabular-nums;
      font-weight:800; letter-spacing:.5px; font-size: clamp(24px, 5.5vw, 42px);
      line-height:1; text-shadow: 0 1px 0 rgba(0,0,0,.35);
    }
    .label{
      margin-top:8px; font-size:12px; color:var(--muted); letter-spacing:.4px;
    }

    /* 脉动强调环（可选，营造 iOS 活动环既视感） */
    .widget .pulse{
      position:absolute; inset:-2px; border-radius:inherit; pointer-events:none;
      background: conic-gradient(from 270deg,
                  var(--accent) 0 25%,
                  transparent 0 50%,
                  var(--accent-2) 0 75%,
                  transparent 0 100%);
      mask: radial-gradient(farthest-side, transparent calc(100% - 6px), #000 0);
      opacity:.18; filter: blur(12px); animation: spin 24s linear infinite;
    }
    @keyframes spin{ to{ transform: rotate(360deg) } }

    /* ---------- 控制面板（玻璃底栏） ---------- */
    .panel{
      position:relative;
      border-radius: var(--radius);
      background: var(--glass-bg);
      border:1px solid var(--glass-stroke-soft);
      backdrop-filter: blur(18px) saturate(140%);
      -webkit-backdrop-filter: blur(18px) saturate(140%);
      box-shadow: var(--shadow), inset 0 1px 0 rgba(255,255,255,.25);
      padding:16px 16px 14px;
      display:grid; gap:12px;
    }
    .controls{
      display:grid; gap:10px;
      grid-template-columns: 1fr;
    }
    @media (min-width: 620px){
      .controls{ grid-template-columns: 1.2fr 1fr 140px; align-items:end; }
    }
    label{
      font-size:12px; color:var(--muted); display:block; margin:0 0 6px 4px;
    }
    input[type="text"], input[type="datetime-local"]{
      width:100%; box-sizing: border-box;
      border-radius: 14px; padding:12px 14px; border:1px solid rgba(255,255,255,.28);
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      color:var(--fg); outline:none;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.35), 0 4px 12px rgba(0,0,0,.18);
      font-weight:600;
    }
    input::placeholder{ color:#c8cfdb; opacity:.6; }
    .actions{
      display:flex; gap:10px; flex-wrap:wrap; align-items:center;
    }
    .btn{
      appearance:none; border:none; cursor:pointer; user-select:none;
      padding:12px 16px; border-radius: 999px; font-weight:800; letter-spacing:.4px;
      background: linear-gradient(180deg, rgba(255,255,255,.9), rgba(255,255,255,.75));
      color:#0d1320; box-shadow: 0 8px 20px rgba(0,0,0,.35), inset 0 1px 0 rgba(255,255,255,.7);
      transition: transform .08s ease, box-shadow .2s ease, filter .2s ease;
    }
    .btn:active{ transform:translateY(1px) scale(.99) }
    .btn.ghost{
      background: linear-gradient(180deg, rgba(255,255,255,.16), rgba(255,255,255,.06));
      color:var(--fg);
      border:1px solid rgba(255,255,255,.28);
    }

    .hint{
      font-size:12px; color:var(--muted); text-align:center; margin-top:2px;
    }

    /* 无障碍：隐藏但可读 */
    .sr-only{
      position:absolute; width:1px; height:1px; padding:0; margin:-1px; overflow:hidden; clip:rect(0,0,0,0); white-space:nowrap; border:0;
    }

    /* 降低动态偏好 */
    @media (prefers-reduced-motion: reduce){
      .blob{ animation: none }
      .pulse{ animation: none }
    }
  </style>
</head>
<body>
  <!-- 动态彩斑背景 -->
  <div class="blobs" aria-hidden="true">
    <div class="blob"></div>
    <div class="blob"></div>
    <div class="blob"></div>
  </div>

  <main class="screen">
    <div class="stack">
      <!-- 倒计时主小组件 -->
      <section class="widget" role="group" aria-labelledby="title">
        <div class="pulse" aria-hidden="true"></div>
        <header class="widget-header">
          <div class="title" id="title">
            <span class="emoji" id="emoji" aria-hidden="true">⏳</span>
            <span id="eventName">倒计时</span>
          </div>
          <div class="until" id="untilText">—</div>
        </header>

        <div class="timer" aria-live="polite" aria-atomic="true">
          <div class="unit">
            <div class="value" id="days">00</div>
            <div class="label">天</div>
          </div>
          <div class="unit">
            <div class="value" id="hours">00</div>
            <div class="label">小时</div>
          </div>
          <div class="unit">
            <div class="value" id="minutes">00</div>
            <div class="label">分钟</div>
          </div>
          <div class="unit">
            <div class="value" id="seconds">00</div>
            <div class="label">秒</div>
          </div>
          <span class="sr-only" id="srAnnouncer"></span>
        </div>
      </section>

      <!-- 玻璃控制面板 -->
      <aside class="panel" aria-label="设置倒计时">
        <div class="controls">
          <div>
            <label for="nameInput">事件</label>
            <input id="nameInput" type="text" placeholder="例如：发版、考试、旅行…" maxlength="24">
          </div>
          <div>
            <label for="timeInput">目标时间</label>
            <input id="timeInput" type="datetime-local">
          </div>
          <div class="actions">
            <button class="btn" id="applyBtn">应用</button>
            <button class="btn ghost" id="resetBtn">重置</button>
          </div>
        </div>
        <div class="hint">小贴士：设置会自动保存到本地（LocalStorage）。支持 iPhone/iPad 桌面快速添加为网页应用。</div>
      </aside>
    </div>
  </main>

  <script>
    // ---- 工具函数 ----
    const $ = (sel) => document.querySelector(sel);
    const pad2 = (n)=> String(n).padStart(2,'0');
    const toDatetimeLocal = (d)=>{
      const dt = new Date(d.getTime() - d.getTimezoneOffset()*60000);
      return dt.toISOString().slice(0,16);
    };
    const fmtLong = (d)=>{
      try{
        return new Intl.DateTimeFormat(undefined, {
          year:'numeric', month:'long', day:'numeric',
          hour:'2-digit', minute:'2-digit'
        }).format(d);
      }catch{
        return d.toLocaleString();
      }
    };

    // ---- DOM ----
    const elDays = $('#days'), elHours = $('#hours'), elMinutes = $('#minutes'), elSeconds = $('#seconds');
    const elEvent = $('#eventName'), elEmoji = $('#emoji'), elUntil = $('#untilText'), elAnnounce = $('#srAnnouncer');
    const inName = $('#nameInput'), inTime = $('#timeInput');
    const btnApply = $('#applyBtn'), btnReset = $('#resetBtn');

    // ---- 状态与存储 ----
    const STORAGE_KEY = 'ios_countdown_state_v2';
    const defaultTarget = (() => {
      // 默认：今年或明年的 05-06 00:00
      const now = new Date();
      const year = now.getMonth() > 4 || (now.getMonth() === 4 && now.getDate() > 6)
        ? now.getFullYear() + 1
        : now.getFullYear();
      return new Date(year, 4, 6, 0, 0, 0);
    })();
    let state = {
      name: '生日倒计时',
      emoji: '🎂',
      targetISO: defaultTarget.toISOString()
    };

    function load(){
      try{
        const raw = localStorage.getItem(STORAGE_KEY);
        if(raw){
          const parsed = JSON.parse(raw);
          Object.assign(state, parsed);
        }
      }catch{}
      inName.value = state.name;
      inTime.value = toDatetimeLocal(new Date(state.targetISO));
      renderHeader();
    }
    function save(){
      localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    }

    function renderHeader(){
      elEvent.textContent = state.name || '倒计时';
      elEmoji.textContent = state.emoji || '⏳';
      const t = new Date(state.targetISO);
      elUntil.textContent = '目标：' + fmtLong(t);
    }

    // ---- 计时逻辑（对齐整秒，减少漂移） ----
    let rafId = null, tickTimer = null, lastAnnounced = '';
    function startTicker(){
      stopTicker();
      const align = ()=> {
        const now = Date.now();
        const msToNextSecond = 1000 - (now % 1000);
        tick(); // 先马上更新一次
        tickTimer = setTimeout(()=>{
          tick();
          rafLoop();
        }, msToNextSecond + 5);
      };
      const rafLoop = ()=>{
        // 每秒用 setTimeout 对齐，其余用 rAF 平滑刷新（节能时浏览器会降频）
        tick();
        rafId = requestAnimationFrame(rafLoop);
      };
      align();
    }
    function stopTicker(){
      if(rafId) cancelAnimationFrame(rafId), rafId=null;
      if(tickTimer) clearTimeout(tickTimer), tickTimer=null;
    }

    function tick(){
      const now = new Date();
      const target = new Date(state.targetISO);
      let diff = Math.max(0, target - now);
      const totalSec = Math.floor(diff / 1000);

      const days = Math.floor(totalSec / 86400);
      const hours = Math.floor((totalSec % 86400) / 3600);
      const minutes = Math.floor((totalSec % 3600) / 60);
      const seconds = totalSec % 60;

      // 更新 UI
      elDays.textContent = String(days).padStart(2,'0');
      elHours.textContent = pad2(hours);
      elMinutes.textContent = pad2(minutes);
      elSeconds.textContent = pad2(seconds);

      // 无障碍播报（每 5 秒播报一次，避免刷屏）
      const announceKey = `${days}-${hours}-${minutes}-${Math.floor(seconds/5)}`;
      if(announceKey !== lastAnnounced){
        lastAnnounced = announceKey;
        elAnnounce.textContent = `${state.name} 剩余 ${days} 天 ${hours} 小时 ${minutes} 分钟 ${seconds} 秒`;
      }
    }

    // ---- 交互 ----
    btnApply.addEventListener('click', ()=>{
      const name = inName.value.trim() || '倒计时';
      const dtValue = inTime.value; // "YYYY-MM-DDTHH:mm"
      if(!dtValue){
        alert('请先选择目标时间');
        return;
      }
      const local = new Date(dtValue);
      if(isNaN(+local)){
        alert('时间格式不正确');
        return;
      }
      state.name = name;
      state.targetISO = new Date(local.getTime() - local.getTimezoneOffset()*60000).toISOString(); // 以 UTC 存
      save();
      renderHeader();
      tick(); // 立即刷新
    });

    btnReset.addEventListener('click', ()=>{
      state = { name:'生日倒计时', emoji:'🎂', targetISO: defaultTarget.toISOString() };
      save();
      load();
      tick();
    });

    // 支持回车快速应用
    inName.addEventListener('keydown', e=>{ if(e.key==='Enter') btnApply.click(); });
    inTime.addEventListener('keydown', e=>{ if(e.key==='Enter') btnApply.click(); });

    // 初始化
    (function init(){
      // 设置 datetime-local 的最小值为当前
      const now = new Date();
      $('#timeInput').min = toDatetimeLocal(now);
      load();
      startTicker();
      // 页面可见性变化时，重启计时器保证对齐
      document.addEventListener('visibilitychange', ()=>{
        if(document.visibilityState==='visible') startTicker();
        else stopTicker();
      });
    })();
  </script>
</body>
</html>
